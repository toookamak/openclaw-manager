services:
  openclaw-manager:
    build: .
    container_name: openclaw-manager
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
